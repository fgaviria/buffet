<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Buffet Family</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
    }

    input,
    button,
    select,
    textarea {
      font-family: inherit;
    }

    a {
      color: #185FA5;
    }

    /* ── Reset inputs / buttons to match design ── */
    input[type=text],
    input[type=password],
    input[type=tel] {
      appearance: none;
      outline: none;
      transition: border-color .15s;
    }

    input[type=text]:focus,
    input[type=password]:focus,
    input[type=tel]:focus {
      border-color: #185FA5 !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script>
    // ═══════════════════════════════════════════════════════════════
    //  ⚙️  CONFIGURACIÓN — editá estas líneas antes de deployar
    // ═══════════════════════════════════════════════════════════════
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7msBJOYYIQvOjfimoaP5zKUkyLI5j5giOxlD5ZDArjfE6dhy8Zk0TJLSNNQIKS4U/exec";
    const KIOSK_PIN = "1928";   // PIN para acceder al panel de entregas
    const ALIAS_PAGO = "BuffetFamily2026";
    const DISCOUNT = 0.15;     // 15% de descuento
    const EVENT_NAME = "Buffet Family";
    const EVENT_SUBTITLE = "Evento del colegio";

    // ── Menú ──────────────────────────────────────────────────────
    const MENU = [
      { id: 1, name: "Sándwich de milanesa", price: 1200, desc: "Con lechuga y tomate", emoji: "🥪" },
      { id: 2, name: "Sándwich de jamón y queso", price: 900, desc: "En pan de molde tostado", emoji: "🫓" },
      { id: 3, name: "Empanada x3", price: 700, desc: "Carne, pollo o caprese", emoji: "🫔" },
      { id: 4, name: "Porción de pizza", price: 850, desc: "Muzzarella o especial", emoji: "🍕" },
      { id: 5, name: "Gaseosa 500ml", price: 500, desc: "Coca, Sprite o Fanta", emoji: "🥤" },
      { id: 6, name: "Agua mineral", price: 350, desc: "Con o sin gas", emoji: "💧" },
      { id: 7, name: "Combo familiar", price: 2800, desc: "2 sándwiches + 2 bebidas", emoji: "🧺" },
    ];
    // ═══════════════════════════════════════════════════════════════

    const { useState, useEffect } = React;
    const LOCAL_KEY = "kiosko_orders_v3";
    const LOCAL_META = "kiosko_meta_v3";

    const C = {
      blue: "#185FA5",
      blueLight: "#e6f1fb",
      blueBorder: "#85b7eb",
      green: "#0F6E56",
      greenLight: "#e1f5ee",
      greenBorder: "#5dcaa5",
      amber: "#B45309",
      amberLight: "#faeeda",
      amberBorder: "#ef9f27",
      red: "#A32D2D",
      redLight: "#fcebeb",
      gray: "#5F5E5A",
      grayLight: "#f5f5f0",
      border: "#e0dfd8",
      white: "#ffffff",
      text: "#1a1a18",
      textMuted: "#5F5E5A",
      textLight: "#888780",
    };

    function fmt(n) {
      return new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS", maximumFractionDigits: 0 }).format(n);
    }

    // GET — para init, getOrders, markDelivered (evita CORS)
    async function apiGet(params) {
      const qs = new URLSearchParams(params).toString();
      const r = await fetch(APPS_SCRIPT_URL + "?" + qs);
      return r.json();
    }

    // POST — solo para submitOrder (lleva base64 del comprobante)
    async function apiPost(payload) {
      const r = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload),
        headers: { "Content-Type": "text/plain" },
      });
      return r.json();
    }

    async function fileToBase64(file) {
      return new Promise((res, rej) => {
        const rd = new FileReader();
        rd.onload = () => res(rd.result.split(",")[1]);
        rd.onerror = rej;
        rd.readAsDataURL(file);
      });
    }

    function loadLocal(key, def) {
      try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(def)); } catch { return def; }
    }
    function saveLocal(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch { }
    }

    // ── Estilos compartidos ────────────────────────────────────────
    const S = {
      page: { maxWidth: 520, margin: "0 auto", padding: "14px 16px 80px", background: C.white, minHeight: "100vh" },
      hdr: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18, paddingBottom: 12, borderBottom: `1px solid ${C.border}` },
      card: { background: C.white, border: `1px solid ${C.border}`, borderRadius: 12, padding: "12px 14px", marginBottom: 8 },
      input: { width: "100%", padding: "9px 11px", fontSize: 14, border: `1px solid ${C.border}`, borderRadius: 8, background: C.grayLight, color: C.text, outline: "none" },
      sec: { marginBottom: 18 },
      secTitle: { fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 },
      divider: { borderTop: `1px solid ${C.border}`, margin: "12px 0" },
      navBtn: (a) => ({
        padding: "6px 11px", fontSize: 12, fontWeight: a ? 600 : 400, cursor: "pointer",
        background: a ? C.blueLight : "transparent",
        color: a ? C.blue : C.textMuted,
        border: `1px solid ${a ? C.blueBorder : C.border}`,
        borderRadius: 8,
      }),
      qBtn: { width: 30, height: 30, borderRadius: "50%", border: `1px solid ${C.border}`, background: C.grayLight, color: C.text, cursor: "pointer", fontSize: 18, lineHeight: "30px", textAlign: "center" },
      primBtn: { padding: "10px 18px", fontSize: 14, fontWeight: 600, cursor: "pointer", borderRadius: 8, background: C.blue, color: "white", border: "none" },
      ghostBtn: { padding: "8px 14px", fontSize: 13, cursor: "pointer", borderRadius: 8, background: "transparent", color: C.textMuted, border: `1px solid ${C.border}` },
      greenBtn: { padding: "8px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", borderRadius: 8, background: C.green, color: "white", border: "none" },
      badge: (ok) => ({
        display: "inline-block", padding: "3px 9px", borderRadius: 8, fontSize: 12, fontWeight: 600,
        background: ok ? C.greenLight : C.amberLight,
        color: ok ? C.green : C.amber,
      }),
      infoCard: { background: C.blueLight, border: `1px solid ${C.blueBorder}`, borderRadius: 12, padding: "12px 14px", marginBottom: 8 },
      warnCard: { background: C.amberLight, border: `1px solid ${C.amberBorder}`, borderRadius: 8, padding: "9px 12px", marginBottom: 8 },
      succCard: { background: C.greenLight, border: `1px solid ${C.greenBorder}`, borderRadius: 8, padding: "9px 12px", marginBottom: 8 },
      overlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 900 },
      modal: { background: C.white, borderRadius: 14, border: `1px solid ${C.border}`, padding: "24px 20px", maxWidth: 320, width: "90%", textAlign: "center" },
      toast: (type) => ({
        position: "fixed", bottom: 16, left: "50%", transform: "translateX(-50%)",
        padding: "9px 18px", borderRadius: 8, fontSize: 13, fontWeight: 600, zIndex: 999,
        background: type === "err" ? C.red : type === "warn" ? C.amber : C.green,
        color: "white", whiteSpace: "nowrap", pointerEvents: "none",
      }),
    };

    // ── Componente raíz ────────────────────────────────────────────
    function App() {
      const [view, setView] = useState("home");
      const [orders, setOrders] = useState(() => loadLocal(LOCAL_KEY, []));
      const [cart, setCart] = useState({});
      const [name, setName] = useState("");
      const [phone, setPhone] = useState("");
      const [file, setFile] = useState(null);
      const [fileName, setFileName] = useState("");
      const [submitted, setSubmitted] = useState(null);
      const [search, setSearch] = useState("");
      const [result, setResult] = useState(null);
      const [searched, setSearched] = useState(false);
      const [confirm, setConfirm] = useState(null);
      const [toast, setToast] = useState(null);
      const [pin, setPin] = useState("");
      const [unlocked, setUnlocked] = useState(false);
      const [loading, setLoading] = useState(false);
      const [meta, setMeta] = useState(() => loadLocal(LOCAL_META, {}));

      const backendOk = meta.backendOk || false;

      useEffect(() => { saveLocal(LOCAL_KEY, orders); }, [orders]);
      useEffect(() => { saveLocal(LOCAL_META, meta); }, [meta]);

      function toast_(msg, type = "ok") {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3500);
      }

      // Carrito
      const add = (id) => setCart(c => ({ ...c, [id]: (c[id] || 0) + 1 }));
      const remove = (id) => setCart(c => { const n = { ...c }; n[id] > 1 ? n[id]-- : delete n[id]; return n; });
      const items = () => Object.entries(cart).filter(([, q]) => q > 0).map(([id, qty]) => ({ ...MENU.find(m => m.id === +id), qty }));
      const rawT = items().reduce((s, i) => s + i.price * i.qty, 0);
      const discT = Math.round(rawT * (1 - DISCOUNT));
      const nextN = () => orders.reduce((m, o) => Math.max(m, o.number || 0), 0) + 1;

      // Init backend
      async function initBackend() {
        setLoading(true);
        try {
          const res = await apiGet({ action: "init" });
          if (res.ok) {
            setMeta({ backendOk: true, sheetUrl: res.spreadsheetUrl, driveUrl: res.folderUrl });
            toast_("Backend inicializado ✓");
          } else toast_("Error: " + res.error, "err");
        } catch { toast_("No se pudo conectar al backend", "err"); }
        setLoading(false);
      }

      // Sync
      async function syncOrders() {
        setLoading(true);
        try {
          const data = await apiGet({ action: "getOrders" });
          if (data.ok && data.orders && data.orders.length > 0) {
            const merged = data.orders.map(r => {
              const loc = orders.find(o => String(o.number) === String(r.number));
              return loc ? { ...loc, delivered: r.delivered } : {
                number: r.number, name: r.name, phone: r.phone, itemsStr: r.itemsStr,
                items: r.itemsStr.split(", ").map(s => { const [q, ...rest] = s.split("x "); return { name: rest.join("x ").trim(), qty: +q }; }),
                total: r.total, fileUrl: r.fileUrl, delivered: r.delivered, at: r.at
              };
            });
            setOrders(merged);
            toast_(`${merged.length} pedidos sincronizados`);
          } else toast_("Sin pedidos en Sheets todavía");
        } catch { toast_("Error al sincronizar", "err"); }
        setLoading(false);
      }

      // Submit
      async function submit() {
        if (!name.trim()) { toast_("Ingresá tu nombre", "err"); return; }
        if (!items().length) { toast_("Agregá al menos un ítem", "err"); return; }
        if (!file) { toast_("Adjuntá el comprobante", "err"); return; }
        setLoading(true);
        const number = nextN();
        try {
          const b64 = await fileToBase64(file);
          const res = await apiPost({
            action: "submitOrder", number,
            name: name.trim(), phone: phone.trim(),
            items: items(), total: discT,
            fileData: b64, fileName: file.name, fileType: file.type,
          });
          if (!res.ok) throw new Error(res.error || "Error");
          const order = { number, name: name.trim(), phone: phone.trim(), items: items(), total: discT, fileName: file.name, fileUrl: res.fileUrl || "", delivered: false, at: new Date().toISOString() };
          setOrders(p => [...p, order]);
          setSubmitted(order);
          setCart({}); setName(""); setPhone(""); setFile(null); setFileName("");
          setView("done");
        } catch {
          const order = { number, name: name.trim(), phone: phone.trim(), items: items(), total: discT, fileName: file.name, fileUrl: "", delivered: false, at: new Date().toISOString(), pendingSync: true };
          setOrders(p => [...p, order]);
          setSubmitted(order);
          setCart({}); setName(""); setPhone(""); setFile(null); setFileName("");
          setView("done");
          toast_("Sin conexión — pedido guardado localmente", "warn");
        }
        setLoading(false);
      }

      // Búsqueda
      function doSearch() {
        setSearched(true);
        const q = search.trim();
        if (!q) { setResult(null); return; }
        const byN = orders.find(o => String(o.number) === q);
        if (byN) { setResult(byN); return; }
        const byNm = orders.filter(o => o.name.toLowerCase().includes(q.toLowerCase()));
        if (byNm.length === 1) { setResult(byNm[0]); return; }
        if (byNm.length > 1) { setResult({ multi: byNm }); return; }
        setResult(null);
      }

      async function doDeliver() {
        const o = confirm; setConfirm(null);
        setOrders(prev => prev.map(x => x.number === o.number ? { ...x, delivered: true } : x));
        if (result && !result.multi) setResult(p => ({ ...p, delivered: true }));
        try {
          const res = await apiGet({ action: "markDelivered", number: o.number });
          toast_(res.ok ? `Pedido #${o.number} entregado ✓` : `#${o.number} entregado (sin sync)`, res.ok ? "ok" : "warn");
        } catch { toast_(`#${o.number} entregado (sin sync)`, "warn"); }
      }

      // ── OCard ──
      function OCard({ o, big }) {
        const itsStr = o.items ? o.items.map(i => `${i.qty}x ${i.name}`).join(" · ") : (o.itemsStr || "");
        return React.createElement("div", null,
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 } },
            React.createElement("div", null,
              React.createElement("div", { style: { fontSize: big ? 26 : 17, fontWeight: 600, color: C.text } }, "#" + o.number),
              React.createElement("div", { style: { fontSize: 13, color: C.textMuted, marginTop: 1 } }, o.name + (o.phone ? " · " + o.phone : ""))
            ),
            React.createElement("span", { style: S.badge(o.delivered) }, o.delivered ? "✓ Entregado" : "Pendiente")
          ),
          React.createElement("div", { style: { marginTop: 5, fontSize: 12, color: C.textMuted } }, itsStr),
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 } },
            React.createElement("div", null,
              React.createElement("span", { style: { fontSize: 13, fontWeight: 600, color: C.text } }, fmt(o.total)),
              o.fileUrl && React.createElement("a", { href: o.fileUrl, target: "_blank", rel: "noreferrer", style: { fontSize: 11, color: C.blue, marginLeft: 10 } }, "📎 Comprobante")
            ),
            !o.delivered && React.createElement("button", { style: S.greenBtn, onClick: () => setConfirm(o) }, "Marcar entregado")
          )
        );
      }

      // ── RENDER ──
      return React.createElement("div", { style: S.page },

        // Toast
        toast && React.createElement("div", { style: S.toast(toast.type) }, toast.msg),

        // Confirm modal
        confirm && React.createElement("div", { style: S.overlay },
          React.createElement("div", { style: S.modal },
            React.createElement("div", { style: { fontSize: 22, fontWeight: 600, marginBottom: 6, color: C.text } }, "¿Confirmar entrega?"),
            React.createElement("div", { style: { fontSize: 15, color: C.textMuted, marginBottom: 4 } }, "Pedido ", React.createElement("strong", null, "#" + confirm.number)),
            React.createElement("div", { style: { fontSize: 15, color: C.text, marginBottom: 18 } }, confirm.name),
            React.createElement("div", { style: { display: "flex", gap: 10, justifyContent: "center" } },
              React.createElement("button", { style: S.ghostBtn, onClick: () => setConfirm(null) }, "Cancelar"),
              React.createElement("button", { style: S.greenBtn, onClick: doDeliver }, "Confirmar entrega")
            )
          )
        ),

        // Header
        React.createElement("div", { style: S.hdr },
          React.createElement("div", null,
            React.createElement("div", { style: { fontSize: 17, fontWeight: 700, color: C.text } }, EVENT_NAME),
            React.createElement("div", { style: { fontSize: 12, color: C.textMuted, marginTop: 1 } }, EVENT_SUBTITLE)
          ),
          React.createElement("div", { style: { display: "flex", gap: 6 } },
            React.createElement("button", { style: S.navBtn(view === "home" || view === "done"), onClick: () => setView("home") }, "Pedir"),
            React.createElement("button", { style: S.navBtn(view === "kiosk"), onClick: () => { setView("kiosk"); setSearch(""); setResult(null); setSearched(false); } }, "Entregar"),
            React.createElement("button", { style: S.navBtn(view === "config"), onClick: () => setView("config") }, "⚙")
          )
        ),

        // ── VISTA HOME ──
        view === "home" && React.createElement("div", null,
          React.createElement("div", { style: { ...S.succCard, fontWeight: 600, fontSize: 13, marginBottom: 16 } },
            "🎉 " + Math.round(DISCOUNT * 100) + "% de descuento en todos los productos — ¡pagá anticipado!"
          ),
          React.createElement("div", { style: S.sec },
            React.createElement("div", { style: S.secTitle }, "Menú"),
            MENU.map(item => {
              const qty = cart[item.id] || 0;
              const disc = Math.round(item.price * (1 - DISCOUNT));
              return React.createElement("div", { key: item.id, style: S.card },
                React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 } },
                  React.createElement("div", { style: { flex: 1 } },
                    React.createElement("div", { style: { fontSize: 14, fontWeight: 600, color: C.text } }, item.emoji + " " + item.name),
                    React.createElement("div", { style: { fontSize: 12, color: C.textMuted, marginTop: 2 } }, item.desc),
                    React.createElement("div", { style: { marginTop: 5, display: "flex", gap: 7, alignItems: "baseline" } },
                      React.createElement("span", { style: { fontSize: 14, fontWeight: 700, color: C.blue } }, fmt(disc)),
                      React.createElement("span", { style: { fontSize: 11, color: C.textLight, textDecoration: "line-through" } }, fmt(item.price))
                    )
                  ),
                  React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
                    qty > 0 && React.createElement("button", { style: S.qBtn, onClick: () => remove(item.id) }, "−"),
                    qty > 0 && React.createElement("span", { style: { fontSize: 14, fontWeight: 700, minWidth: 16, textAlign: "center" } }, qty),
                    React.createElement("button", { style: S.qBtn, onClick: () => add(item.id) }, "+")
                  )
                )
              );
            })
          ),

          items().length > 0 && React.createElement("div", { style: { ...S.infoCard, marginBottom: 8 } },
            React.createElement("div", { style: { fontSize: 13, fontWeight: 700, color: C.blue, marginBottom: 8 } }, "Tu pedido"),
            items().map(i => React.createElement("div", { key: i.id, style: { display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 3, color: C.text } },
              React.createElement("span", null, i.qty + "x " + i.name),
              React.createElement("span", null, fmt(Math.round(i.price * i.qty * (1 - DISCOUNT))))
            )),
            React.createElement("div", { style: S.divider }),
            React.createElement("div", { style: { display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 14, color: C.blue } },
              React.createElement("span", null, "Total con descuento"),
              React.createElement("span", null, fmt(discT))
            )
          ),

          React.createElement("div", { style: { background: C.amberLight, border: `1px solid ${C.amberBorder}`, borderRadius: 12, padding: "14px 16px", marginBottom: 16 } },
            React.createElement("div", { style: { fontSize: 12, color: C.amber, fontWeight: 700, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.05em" } }, "Pagá por transferencia"),
            React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 } },
              React.createElement("div", null,
                React.createElement("div", { style: { fontSize: 11, color: C.amber, marginBottom: 2 } }, "Alias CBU / CVU"),
                React.createElement("div", { style: { fontSize: 20, fontWeight: 700, color: C.text, letterSpacing: "0.02em" } }, ALIAS_PAGO)
              ),
              React.createElement("button", {
                style: { padding: "10px 16px", fontSize: 13, fontWeight: 700, cursor: "pointer", borderRadius: 8, background: C.amber, color: "white", border: "none", whiteSpace: "nowrap" },
                onClick: () => {
                  navigator.clipboard.writeText(ALIAS_PAGO)
                    .then(() => toast_("✓ Alias copiado"))
                    .catch(() => {
                      const el = document.createElement("textarea");
                      el.value = ALIAS_PAGO; document.body.appendChild(el); el.select();
                      document.execCommand("copy"); document.body.removeChild(el);
                      toast_("✓ Alias copiado");
                    });
                }
              }, "📋 Copiar alias")
            ),
            React.createElement("div", { style: { fontSize: 11, color: C.amber, marginTop: 8 } }, "Después de pagar, adjuntá el comprobante abajo ↓")
          ),

          React.createElement("div", { style: S.sec },
            React.createElement("div", { style: S.secTitle }, "Tus datos"),
            React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
              React.createElement("input", { style: S.input, placeholder: "Nombre y apellido *", value: name, onChange: e => setName(e.target.value) }),
              React.createElement("input", { style: S.input, placeholder: "Teléfono (opcional)", value: phone, onChange: e => setPhone(e.target.value) })
            )
          ),

          React.createElement("div", { style: S.sec },
            React.createElement("div", { style: S.secTitle }, "Comprobante de pago"),
            React.createElement("div", { style: { ...S.card, textAlign: "center", cursor: "pointer" }, onClick: () => document.getElementById("fi").click() },
              fileName
                ? React.createElement("div", null, React.createElement("div", { style: { fontSize: 22, marginBottom: 3 } }, "📎"), React.createElement("div", { style: { fontSize: 13, color: C.blue, fontWeight: 600 } }, fileName))
                : React.createElement("div", null, React.createElement("div", { style: { fontSize: 22, marginBottom: 3 } }, "📤"), React.createElement("div", { style: { fontSize: 13, color: C.textMuted } }, "Adjuntar comprobante de MercadoPago"), React.createElement("div", { style: { fontSize: 11, color: C.textLight, marginTop: 2 } }, "JPG, PNG o PDF"))
            ),
            React.createElement("input", { id: "fi", type: "file", accept: "image/*,.pdf", style: { display: "none" }, onChange: e => { const f = e.target.files[0]; if (f) { setFile(f); setFileName(f.name); } } })
          ),

          React.createElement("button", {
            style: { ...S.primBtn, width: "100%", padding: "13px 0", fontSize: 15, opacity: loading ? 0.6 : 1 },
            onClick: submit, disabled: loading
          }, loading ? "Enviando pedido…" : "Confirmar pedido →")
        ),

        // ── CONFIRMACIÓN ──

          React.createElement("div", { style: { fontSize: 48, marginBottom: 10 } }, "✅"),

              React.createElement("span", null, fmt(Math.round(i.price * i.qty * (1 - DISCOUNT))))

          React.createElement("button", { style: { ...S.ghostBtn, marginTop: 14 }, onClick: () => setView("home") }, "Hacer otro pedido")

        // ── KIOSCO LOGIN ──

          React.createElement("div", { style: { fontSize: 40, marginBottom: 10 } }, "🔒"),

          React.createElement("div", { style: { fontSize: 13, color: C.textMuted, marginBottom: 22 } }, "Ingresá el PIN para continuar"),
          React.createElement("input", {

            onChange: e => setPin(e.target.value),
            onKeyDown: e => e.key === "Enter" && (pin === KIOSK_PIN ? setUnlocked(true) : toast_("PIN incorrecto", "err"))

          React.createElement("button", { style: S.primBtn, onClick: () => pin === KIOSK_PIN ? setUnlocked(true) : toast_("PIN incorrecto", "err") }, "Ingresar"),
          React.createElement("div", { style: { fontSize: 11, color: C.textLight, marginTop: 10 } }, "PIN del equipo de entrega")
        ),

        // ── KIOSCO PANEL ──
        view === "kiosk" && unlocked && React.createElement("div", null,
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 } },
            React.createElement("div", null,
              React.createElement("div", { style: { fontSize: 15, fontWeight: 700, color: C.text } }, "Panel de entregas"),
              React.createElement("div", { style: { fontSize: 12, color: C.textMuted } },
                orders.length + " pedidos · " + orders.filter(o => o.delivered).length + " entregados"

            ),
            React.createElement("div", { style: { display: "flex", gap: 6 } },
              React.createElement("button", { style: { ...S.ghostBtn, fontSize: 12 }, onClick: syncOrders, disabled: loading }, loading ? "…" : "↻ Sync"),
              React.createElement("button", { style: { ...S.ghostBtn, fontSize: 12 }, onClick: () => { setUnlocked(false); setPin(""); } }, "Salir")
            )
          ),

          !backendOk && React.createElement("div", { style: { ...S.warnCard, fontSize: 12, marginBottom: 12 } },
            "⚠ Backend no configurado — los pedidos se guardan solo localmente. Configurá en ⚙"
          ),

          React.createElement("div", { style: { display: "flex", gap: 8, marginBottom: 14 } },
            React.createElement("input", { style: { ...S.input, flex: 1 }, placeholder: "Buscar por número o nombre…", value: search, onChange: e => setSearch(e.target.value), onKeyDown: e => e.key === "Enter" && doSearch() }),
            React.createElement("button", { style: S.primBtn, onClick: doSearch }, "Buscar")
          ),

          searched && !result && React.createElement("div", { style: { ...S.card, textAlign: "center", color: C.textMuted, fontSize: 13 } }, "No se encontraron pedidos"),

            React.createElement("div", { style: { fontSize: 12, color: C.textMuted, marginBottom: 6 } }, result.multi.length + " resultados:"),
            result.multi.map(o => React.createElement("div", { key: o.number, style: S.card }, React.createElement(OCard, { o, big: false })))
          ),

            React.createElement(OCard, { o: result, big: true })

          React.createElement("div", { style: S.divider }),
          React.createElement("div", { style: { ...S.secTitle, marginBottom: 8 } }, "Todos los pedidos"),
          orders.length === 0 && React.createElement("div", { style: { fontSize: 13, color: C.textLight } }, "Aún no hay pedidos"),
          [...orders].reverse().map(o => React.createElement("div", { key: o.number, style: { ...S.card, opacity: o.delivered ? 0.6 : 1 } },
            React.createElement(OCard, { o, big: false })
          ))
        ),

        // ── CONFIG ──
        view === "config" && React.createElement("div", null,
          React.createElement("div", { style: { fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 16 } }, "Configuración del backend"),

          React.createElement("div", { style: S.card },
            React.createElement("div", { style: { fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 6 } }, "Estado"),
            React.createElement("div", { style: { fontSize: 13, color: backendOk ? C.green : C.amber } },
              backendOk ? "✓ Conectado a Google Apps Script" : "⚠ Sin configurar"
            ),
            backendOk && meta.sheetUrl && React.createElement("div", { style: { marginTop: 8, display: "flex", flexDirection: "column", gap: 5 } },
              React.createElement("a", { href: meta.sheetUrl, target: "_blank", rel: "noreferrer", style: { fontSize: 12 } }, "📊 Abrir Google Sheet"),
              React.createElement("a", { href: meta.driveUrl, target: "_blank", rel: "noreferrer", style: { fontSize: 12 } }, "📁 Abrir carpeta en Drive")
            )
          ),

          React.createElement("div", { style: { ...S.card, background: C.grayLight } },
            React.createElement("div", { style: { fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 8 } }, "Pasos para configurar"),
            React.createElement("ol", { style: { fontSize: 12, color: C.textMuted, paddingLeft: 16, lineHeight: 1.9 } },
              React.createElement("li", null, "Abrí ", React.createElement("a", { href: "https://script.google.com", target: "_blank" }, "script.google.com"), " con la cuenta Gmail del evento"),
              React.createElement("li", null, "Nuevo proyecto → pegá el código de Code.gs"),
              React.createElement("li", null, "Implementar → Nueva implementación → Aplicación web"),
              React.createElement("li", null, "Ejecutar como: Yo · Acceso: Cualquier persona"),
              React.createElement("li", null, "Copiá la URL /exec y reemplazá APPS_SCRIPT_URL en este archivo HTML"),
              React.createElement("li", null, "Tocá el botón de abajo para crear la Sheet y Drive")
            )
          ),

          React.createElement("button", {
            style: { ...S.primBtn, width: "100%", padding: "12px 0", opacity: loading ? 0.6 : 1 },
            onClick: initBackend, disabled: loading
          }, loading ? "Inicializando…" : "Inicializar backend en Google")
        )
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
