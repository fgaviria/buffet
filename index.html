<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Buffet Family</title>
  <meta name="version" content="20260422-1335">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
    }

    input,
    button,
    select,
    textarea {
      font-family: inherit;
    }

    a {
      color: #185FA5;
    }

    /* ── Reset inputs / buttons to match design ── */
    input[type=text],
    input[type=password],
    input[type=tel] {
      appearance: none;
      outline: none;
      transition: border-color .15s;
    }

    input[type=text]:focus,
    input[type=password]:focus,
    input[type=tel]:focus {
      border-color: #185FA5 !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script>
    // ═══════════════════════════════════════════════════════════════
    //  ⚙️  CONFIGURACIÓN — editá estas líneas antes de deployar
    // ═══════════════════════════════════════════════════════════════
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwK95rnEEaf4SINVgyaxDpnil2sl_rRZtf8RyHMKmRlHP2gmIesjVZyjGwoVVn5tvFU/exec";
    const KIOSK_PIN = "1928";   // PIN para acceder al panel de entregas
    // Estos valores son defaults — se sobreescriben con los de la pestaña Config de Sheets
    const DEFAULTS = {
      discount: 0.15,
      mensajeDescuento: "🎉 15% de descuento en todos los productos — ¡pagá anticipado!",
      eventoNombre: "Buffet Family",
      eventoSubtitulo: "Evento del colegio",
      aliasPago: "BuffetFamily2026",
    };

    // ── Menú (se carga desde Google Sheets al iniciar) ────────────
    // Estos valores son el fallback offline — se reemplazan con los de la Sheet
    const MENU_DEFAULT = [
      { id: 1, name: "Sándwich de milanesa", price: 1200, desc: "Con lechuga y tomate", emoji: "🥪" },
      { id: 2, name: "Sándwich de jamón y queso", price: 900, desc: "En pan de molde tostado", emoji: "🫓" },
      { id: 3, name: "Empanada x3", price: 700, desc: "Carne, pollo o caprese", emoji: "🫔" },
      { id: 4, name: "Porción de pizza", price: 850, desc: "Muzzarella o especial", emoji: "🍕" },
      { id: 5, name: "Gaseosa 500ml", price: 500, desc: "Coca, Sprite o Fanta", emoji: "🥤" },
      { id: 6, name: "Agua mineral", price: 350, desc: "Con o sin gas", emoji: "💧" },
      { id: 7, name: "Combo familiar", price: 2800, desc: "2 sándwiches + 2 bebidas", emoji: "🧺" },
    ];
    // ═══════════════════════════════════════════════════════════════

    const { useState, useEffect } = React;
    const LOCAL_KEY = "kiosko_orders_v3";
    const LOCAL_META = "kiosko_meta_v3";

    const C = {
      blue: "#185FA5",
      blueLight: "#e6f1fb",
      blueBorder: "#85b7eb",
      green: "#0F6E56",
      greenLight: "#e1f5ee",
      greenBorder: "#5dcaa5",
      amber: "#B45309",
      amberLight: "#faeeda",
      amberBorder: "#ef9f27",
      red: "#A32D2D",
      redLight: "#fcebeb",
      gray: "#5F5E5A",
      grayLight: "#f5f5f0",
      border: "#e0dfd8",
      white: "#ffffff",
      text: "#1a1a18",
      textMuted: "#5F5E5A",
      textLight: "#888780",
    };

    function fmt(n) {
      return new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS", maximumFractionDigits: 0 }).format(n);
    }

    // GET — para init, getOrders, markDelivered (evita CORS)
    async function apiGet(params) {
      const qs = new URLSearchParams(params).toString();
      const r = await fetch(APPS_SCRIPT_URL + "?" + qs);
      return r.json();
    }

    // POST — solo para submitOrder (lleva base64 del comprobante)
    async function apiPost(payload) {
      const r = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload),
        headers: { "Content-Type": "text/plain" },
      });
      return r.json();
    }

    async function fileToBase64(file) {
      return new Promise((res, rej) => {
        const rd = new FileReader();
        rd.onload = () => res(rd.result.split(",")[1]);
        rd.onerror = rej;
        rd.readAsDataURL(file);
      });
    }

    function loadLocal(key, def) {
      try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(def)); } catch { return def; }
    }
    function saveLocal(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch { }
    }

    // ── Estilos compartidos ────────────────────────────────────────
    const S = {
      page: { maxWidth: 520, margin: "0 auto", padding: "14px 16px 80px", background: C.white, minHeight: "100vh" },
      hdr: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18, paddingBottom: 12, borderBottom: `1px solid ${C.border}` },
      card: { background: C.white, border: `1px solid ${C.border}`, borderRadius: 12, padding: "12px 14px", marginBottom: 8 },
      input: { width: "100%", padding: "9px 11px", fontSize: 14, border: `1px solid ${C.border}`, borderRadius: 8, background: C.grayLight, color: C.text, outline: "none" },
      sec: { marginBottom: 18 },
      secTitle: { fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 },
      divider: { borderTop: `1px solid ${C.border}`, margin: "12px 0" },
      navBtn: (a) => ({
        padding: "6px 11px", fontSize: 12, fontWeight: a ? 600 : 400, cursor: "pointer",
        background: a ? C.blueLight : "transparent",
        color: a ? C.blue : C.textMuted,
        border: `1px solid ${a ? C.blueBorder : C.border}`,
        borderRadius: 8,
      }),
      qBtn: { width: 30, height: 30, borderRadius: "50%", border: `1px solid ${C.border}`, background: C.grayLight, color: C.text, cursor: "pointer", fontSize: 18, lineHeight: "30px", textAlign: "center" },
      primBtn: { padding: "10px 18px", fontSize: 14, fontWeight: 600, cursor: "pointer", borderRadius: 8, background: C.blue, color: "white", border: "none" },
      ghostBtn: { padding: "8px 14px", fontSize: 13, cursor: "pointer", borderRadius: 8, background: "transparent", color: C.textMuted, border: `1px solid ${C.border}` },
      greenBtn: { padding: "8px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", borderRadius: 8, background: C.green, color: "white", border: "none" },
      badge: (ok) => ({
        display: "inline-block", padding: "3px 9px", borderRadius: 8, fontSize: 12, fontWeight: 600,
        background: ok ? C.greenLight : C.amberLight,
        color: ok ? C.green : C.amber,
      }),
      infoCard: { background: C.blueLight, border: `1px solid ${C.blueBorder}`, borderRadius: 12, padding: "12px 14px", marginBottom: 8 },
      warnCard: { background: C.amberLight, border: `1px solid ${C.amberBorder}`, borderRadius: 8, padding: "9px 12px", marginBottom: 8 },
      succCard: { background: C.greenLight, border: `1px solid ${C.greenBorder}`, borderRadius: 8, padding: "9px 12px", marginBottom: 8 },
      overlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 900 },
      modal: { background: C.white, borderRadius: 14, border: `1px solid ${C.border}`, padding: "24px 20px", maxWidth: 320, width: "90%", textAlign: "center" },
      toast: (type) => ({
        position: "fixed", bottom: 16, left: "50%", transform: "translateX(-50%)",
        padding: "9px 18px", borderRadius: 8, fontSize: 13, fontWeight: 600, zIndex: 999,
        background: type === "err" ? C.red : type === "warn" ? C.amber : C.green,
        color: "white", whiteSpace: "nowrap", pointerEvents: "none",
      }),
    };

    // ── Componente raíz ────────────────────────────────────────────
    function App() {
      const [view, setView] = useState("home");
      const [orders, setOrders] = useState(() => loadLocal(LOCAL_KEY, []));
      const [menu, setMenu] = useState(() => loadLocal("kiosko_menu_v3", MENU_DEFAULT));
      const [menuLoading, setMenuLoading] = useState(false);
      const [config, setConfig] = useState(() => loadLocal("kiosko_config_v3", DEFAULTS));
      const [cart, setCart] = useState({});
      const [name, setName] = useState("");
      const [phone, setPhone] = useState("");
      const [file, setFile] = useState(null);
      const [fileName, setFileName] = useState("");
      const [submitted, setSubmitted] = useState(null);
      const [search, setSearch] = useState("");
      const [result, setResult] = useState(null);
      const [searched, setSearched] = useState(false);
      const [confirm, setConfirm] = useState(null);
      const [toast, setToast] = useState(null);
      const [pin, setPin] = useState("");
      const [unlocked, setUnlocked] = useState(false);
      const [kioskTab, setKioskTab] = useState("buscar"); // "buscar" | "config"
      const [loading, setLoading] = useState(false);
      const [verifying, setVerifying] = useState(false);
      const [verifyResult, setVerifyResult] = useState(null); // {ok, foundAmount, match}
      const [meta, setMeta] = useState(() => {
        // Lee la clave actual y también versiones anteriores por compatibilidad
        const keys = [LOCAL_META, "kiosko_meta_v2", "kiosko_meta_v1"];
        for (const k of keys) {
          const val = loadLocal(k, null);
          if (val && val.backendOk) return val;
        }
        return {};
      });

      const backendOk = meta.backendOk || false;
      const [backendVerified, setBackendVerified] = useState(null); // null=no chequeado, true/false
      const [resetConfirm, setResetConfirm] = useState(false);
      const [stats, setStats] = useState(null);
      const [statsLoading, setStatsLoading] = useState(false);
      const [resetting, setResetting] = useState(false);
      // Stats
      const [statsUnlocked, setStatsUnlocked] = useState(false);
      const [statsPin, setStatsPin] = useState("");
      const [statsPinError, setStatsPinError] = useState(false);
      // Cajas
      const [cajasUnlocked, setCajasUnlocked] = useState(false);
      const [cajasPin, setCajasPin] = useState("");
      const [cajasMenu, setCajasMenu] = useState([]);
      const [cajasCart, setCajasCart] = useState({});
      const [cajasMetodo, setCajasMetodo] = useState(null); // "Efectivo"|"MercadoPago"
      const [cajasLoading, setCajasLoading] = useState(false);
      const [cajasSubmitted, setCajasSubmitted] = useState(null);
      const [adminPin, setAdminPin] = useState("");
      const [adminPinError, setAdminPinError] = useState(false);

      useEffect(() => { saveLocal(LOCAL_KEY, orders); }, [orders]);
      useEffect(() => { saveLocal(LOCAL_META, meta); }, [meta]);

      // Verifica el backend en tiempo real cuando se abre la tab de config
      useEffect(() => {
        if (kioskTab === "config" && !APPS_SCRIPT_URL.includes("TU_DEPLOYMENT_ID")) {
          setBackendVerified(null);
          apiGet({ action: "ping" })
            .then(res => {
              if (res.ok) {
                setBackendVerified(true);
                if (!meta.backendOk) setMeta(m => ({ ...m, backendOk: true }));
                // Si no tenemos las URLs, las obtenemos con init (no crea duplicados, solo devuelve los IDs existentes)
                if (!meta.sheetUrl) {
                  return apiGet({ action: "init" });
                }
              } else {
                setBackendVerified(false);
              }
            })
            .then(res => {
              if (res && res.ok && res.spreadsheetUrl) {
                setMeta(m => ({ ...m, backendOk: true, sheetUrl: res.spreadsheetUrl, driveUrl: res.folderUrl }));
              }
            })
            .catch(() => setBackendVerified(false));
        }
      }, [kioskTab]);

      // Auto-sync cuando el operador desbloquea el panel
      useEffect(() => {
        if (unlocked && !APPS_SCRIPT_URL.includes("TU_DEPLOYMENT_ID")) {
          syncOrders();
        }
      }, [unlocked]);

      function toast_(msg, type = "ok") {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3500);
      }

      // Carga menú y config desde la Sheet al montar
      useEffect(() => {
        if (APPS_SCRIPT_URL.includes("TU_DEPLOYMENT_ID")) return;
        async function loadRemote() {
          setMenuLoading(true);
          try {
            const [menuRes, cfgRes] = await Promise.all([
              apiGet({ action: "getMenu" }),
              apiGet({ action: "getConfig" }),
            ]);
            if (menuRes.ok && menuRes.menu && menuRes.menu.length > 0) {
              setMenu(menuRes.menu);
              saveLocal("kiosko_menu_v3", menuRes.menu);
            }
            if (cfgRes.ok && cfgRes.config) {
              const c = cfgRes.config;
              const merged = {
                discount: c.descuento !== undefined ? Number(c.descuento) : DEFAULTS.discount,
                mensajeDescuento: c.mensaje_descuento !== undefined ? c.mensaje_descuento : DEFAULTS.mensajeDescuento,
                eventoNombre: c.evento_nombre || DEFAULTS.eventoNombre,
                eventoSubtitulo: c.evento_subtitulo || DEFAULTS.eventoSubtitulo,
                aliasPago: c.alias_pago || DEFAULTS.aliasPago,
              };
              setConfig(merged);
              saveLocal("kiosko_config_v3", merged);
            }
          } catch (e) { /* usa defaults del caché */ }
          setMenuLoading(false);
        }
        loadRemote();
      }, []);

      // Carrito
      const add = (id) => setCart(c => ({ ...c, [id]: (c[id] || 0) + 1 }));
      const remove = (id) => setCart(c => { const n = { ...c }; n[id] > 1 ? n[id]-- : delete n[id]; return n; });
      const items = () => Object.entries(cart).filter(([, q]) => q > 0).map(([id, qty]) => ({ ...menu.find(m => m.id === +id), qty }));
      const rawT = items().reduce((s, i) => s + i.price * i.qty, 0);
      const discT = Math.round(rawT * (1 - config.discount));

      // Init backend
      async function initBackend() {
        setLoading(true);
        try {
          const res = await apiGet({ action: "init" });
          if (res.ok) {
            setMeta({ backendOk: true, sheetUrl: res.spreadsheetUrl, driveUrl: res.folderUrl });
            setBackendVerified(true);
            toast_("Backend inicializado ✓");
          } else toast_("Error: " + res.error, "err");
        } catch { toast_("No se pudo conectar al backend", "err"); }
        setLoading(false);
      }

      // Sync
      async function syncOrders() {
        setLoading(true);
        try {
          const data = await apiGet({ action: "getOrders" });
          if (data.ok && data.orders) {
            if (data.orders.length === 0) {
              toast_("La planilla no tiene pedidos todavía");
              setLoading(false);
              return;
            }
            // Sheets es la fuente de verdad — reconstruye todos los pedidos desde ahí
            // Solo conserva fileUrl local si Sheets no lo tiene (pedido pendiente de sync)
            const fromSheets = data.orders.map(r => {
              const local = orders.find(o => String(o.number) === String(r.number));
              const itemsParsed = r.itemsStr
                ? r.itemsStr.split(", ").map(s => {
                  const idx = s.indexOf("x ");
                  return { qty: +s.slice(0, idx), name: s.slice(idx + 2).trim() };
                })
                : (local ? local.items : []);
              return {
                number: r.number,
                name: r.name,
                phone: r.phone,
                itemsStr: r.itemsStr,
                items: itemsParsed,
                total: Number(r.total),
                fileUrl: r.fileUrl || (local ? local.fileUrl : ""),
                delivered: r.delivered,
                at: r.at,
              };
            });
            // Agrega pedidos locales pendientes de sync que aún no están en Sheets
            const pendingLocal = orders.filter(o =>
              o.pendingSync && !fromSheets.find(r => String(r.number) === String(o.number))
            );
            setOrders([...fromSheets, ...pendingLocal]);
            toast_(`${fromSheets.length} pedidos cargados desde Sheets`);
          } else {
            toast_("Error al leer la planilla", "err");
          }
        } catch (e) {
          toast_("Error al sincronizar: " + e.message, "err");
        }
        setLoading(false);
      }

      // Verificación del comprobante con Claude Vision
      async function verifyPayment(b64, fileType, expectedTotal) {
        try {
          const mediaType = fileType === "application/pdf" ? "application/pdf" : fileType || "image/jpeg";
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 256,
              messages: [{
                role: "user",
                content: [
                  {
                    type: mediaType === "application/pdf" ? "document" : "image",
                    source: { type: "base64", media_type: mediaType, data: b64 }
                  },
                  {
                    type: "text",
                    text: `Sos un verificador de comprobantes de pago argentinos. Analizá esta imagen y respondé SOLO con un JSON sin markdown, con este formato exacto:
{"monto": 1234.56, "moneda": "ARS", "tipo": "transferencia|mercadopago|otro", "encontrado": true}
Si no podés identificar un monto claro respondé: {"monto": null, "encontrado": false}
No agregues ningún texto fuera del JSON.`
                  }
                ]
              }]
            })
          });
          const data = await response.json();
          const text = data.content?.[0]?.text?.trim() || "";
          const clean = text.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(clean);
          if (!parsed.encontrado || parsed.monto === null) {
            return { ok: false, foundAmount: null, match: null };
          }
          // Tolerancia ±5% para cubrir redondeos o descuentos parciales
          const tolerance = expectedTotal * 0.05;
          const match = Math.abs(parsed.monto - expectedTotal) <= tolerance;
          return { ok: true, foundAmount: parsed.monto, match };
        } catch (e) {
          return { ok: false, foundAmount: null, match: null, error: e.message };
        }
      }

      // Submit
      async function submit() {
        if (!name.trim()) { toast_("Ingresá tu nombre", "err"); return; }
        if (!items().length) { toast_("Agregá al menos un ítem", "err"); return; }
        if (!file) { toast_("Adjuntá el comprobante", "err"); return; }

        // ── Verificación del comprobante ──────────────────────────
        setVerifying(true);
        setVerifyResult(null);
        const b64pre = await fileToBase64(file);
        const vResult = await verifyPayment(b64pre, file.type, discT);
        setVerifyResult(vResult);
        setVerifying(false);
        if (vResult.ok && !vResult.match) {
          // Monto detectado pero no coincide — bloquea y pide nuevo comprobante
          setLoading(false);
          return;
        }
        // ─────────────────────────────────────────────────────────

        setLoading(true);
        try {
          const b64 = b64pre; // reutiliza el base64 ya calculado
          const res = await apiPost({
            action: "submitOrder",
            name: name.trim(), phone: phone.trim(),
            items: items(), total: discT,
            fileData: b64, fileName: file.name, fileType: file.type,
          });
          if (!res.ok) throw new Error(res.error || "Error");
          const number = res.orderNumber;
          const order = { number, name: name.trim(), phone: phone.trim(), items: items(), total: discT, fileName: file.name, fileUrl: res.fileUrl || "", delivered: false, at: new Date().toISOString() };
          setOrders(p => [...p, order]);
          setSubmitted(order);
          setCart({}); setName(""); setPhone(""); setFile(null); setFileName("");
          setView("done");
        } catch {
          const tmpNumber = "tmp-" + Date.now();
          const order = { number: tmpNumber, name: name.trim(), phone: phone.trim(), items: items(), total: discT, fileName: file.name, fileUrl: "", delivered: false, at: new Date().toISOString(), pendingSync: true };
          setOrders(p => [...p, order]);
          setSubmitted(order);
          setCart({}); setName(""); setPhone(""); setFile(null); setFileName("");
          setView("done");
          toast_("Sin conexión — pedido guardado localmente", "warn");
        }
        setLoading(false);
      }

      // Cargar estadísticas
      // Calcula estadísticas localmente desde los pedidos en memoria
      // No depende del backend — funciona siempre
      function calcStats(orderList, priceMap) {
        // priceMap: { "Nombre producto": precioUnitario }
        // construido desde menu + cajasMenu para tener precios exactos
        if (!orderList || !orderList.length) return null;

        const productCount = {};
        const comboPairs = {};
        let totalVentas = 0;
        const porMetodo = {};

        orderList.forEach(order => {
          const total = Number(order.total) || 0;
          const metodo = order.metodoPago || "MercadoPago";
          const items = order.items || [];

          totalVentas += total;
          porMetodo[metodo] = (porMetodo[metodo] || 0) + total;

          const names = [];
          items.forEach(({ qty, name, price }) => {
            if (!name) return;
            // Usa precio del priceMap si el item no trae precio (pedidos reconstruidos desde Sheets)
            const unitPrice = (price && price > 0) ? price : (priceMap && priceMap[name]) || 0;
            if (!productCount[name]) productCount[name] = { qty: 0, monto: 0 };
            productCount[name].qty += qty;
            productCount[name].monto += unitPrice * qty;
            names.push(name);
          });

          const unique = [...new Set(names)].sort();
          for (let i = 0; i < unique.length; i++) {
            for (let j = i + 1; j < unique.length; j++) {
              const key = unique[i] + " + " + unique[j];
              comboPairs[key] = (comboPairs[key] || 0) + 1;
            }
          }
        });

        const topByQty = Object.entries(productCount)
          .sort((a, b) => b[1].qty - a[1].qty)
          .slice(0, 15)
          .map(([name, d]) => ({ name, qty: d.qty, monto: Math.round(d.monto) }));

        const topCombos = Object.entries(comboPairs)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 10)
          .map(([combo, count]) => ({ combo, count }));

        return { totalPedidos: orderList.length, totalVentas, porMetodo, topByQty, topCombos };
      }

      // Construye mapa { nombre: precio } desde todos los menús disponibles
      function buildPriceMap() {
        const map = {};
        [...menu, ...cajasMenu].forEach(item => {
          if (item.name && item.price) map[item.name] = item.price;
        });
        return map;
      }

      async function loadStats() {
        setStatsLoading(true);
        // Primero intenta desde el backend (incluye pedidos de todos los dispositivos)
        try {
          const res = await apiGet({ action: "getStats" });
          if (res.ok && res.totalPedidos !== undefined) {
            setStats(res);
            setStatsLoading(false);
            return;
          }
        } catch (e) { }

        // Fallback: calcula desde los pedidos sincronizados localmente
        // (hace sync primero para tener los datos más frescos)
        try {
          const data = await apiGet({ action: "getOrders" });

      // US1: Genera y descarga imagen del ticket como PNG
      async function downloadTicket() {
        const el = document.getElementById("ticket-card");
        if (!el) return;
        // Carga html2canvas dinámicamente
        if (!window.html2canvas) {
          await new Promise((res, rej) => {
            const s = document.createElement("script");
            s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
            s.onload = res; s.onerror = rej;
            document.head.appendChild(s);
          });
        }
        const canvas = await window.html2canvas(el, {
          scale: 3, useCORS: true, backgroundColor: "#ffffff", logging: false
        });

        const fileName = `BuffetFamily-Pedido-${submitted.number}.png`;

        // Intenta Web Share API (iOS/Android → guarda directo en carrete)
        if (navigator.share && navigator.canShare) {
          try {
            canvas.toBlob(async (blob) => {
              const file = new File([blob], fileName, { type: "image/png" });
              if (navigator.canShare({ files: [file] })) {
                await navigator.share({
                  files: [file],
                  title: `Pedido #${submitted.number} — Buffet Family`,
                });
                return;
              }
              // canShare devuelve false — fallback
              fallbackSave(canvas, fileName);
            }, "image/png");
            return;
          } catch (e) {
            if (e.name !== "AbortError") fallbackSave(canvas, fileName);
          }
        } else {
          // Desktop o browser sin Web Share API
          fallbackSave(canvas, fileName);
        }
      }

      function fallbackSave(canvas, fileName) {
        // Abre la imagen en una pestaña nueva para que el usuario la guarde manualmente
        const win = window.open("", "_blank");
        if (win) {
          win.document.write(
            `<html><head><title>${fileName}</title></head><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh">` +
            `<div style="text-align:center">` +
            `<img src="${canvas.toDataURL("image/png")}" style="max-width:100%;border-radius:12px">` +
            `<p style="color:#fff;font-family:sans-serif;margin-top:12px;font-size:14px">Mantené presionada la imagen para guardarla en tu carrete 📲</p>` +
            `</div></body></html>`
          );
        }
      }

        setSearched(true);
        const q = search.trim();

        const byN = orders.find(o => String(o.number) === q);
        if (byN) { setResult(byN); return; }
        const byNm = orders.filter(o => o.name.toLowerCase().includes(q.toLowerCase()));
        if (byNm.length === 1) { setResult(byNm[0]); return; }
        if (byNm.length > 1) { setResult({ multi: byNm }); return; }
        setResult(null);
      }

                React.createElement("div", { style: { fontSize: 12, fontWeight: 600, color: C.red, marginBottom: 12 } },
                  "Esta operación no se puede deshacer."
                ),
                React.createElement("div", { style: { marginBottom: 16 } },
                  React.createElement("div", { style: { fontSize: 12, color: C.textMuted, marginBottom: 6, textAlign: "left" } }, "PIN de administrador"),
                  React.createElement("input", {
                    type: "password",
                    style: {
                      ...S.input, textAlign: "center", letterSpacing: 8, fontSize: 20,
                      borderColor: adminPinError ? C.red : C.border,
                      borderWidth: adminPinError ? 2 : 1
                    },
                    placeholder: "••••", maxLength: 4, value: adminPin,
                    onChange: e => { setAdminPin(e.target.value); setAdminPinError(false); },
                    onKeyDown: e => { if (e.key === "Enter") { if (adminPin === "1749") resetAll(); else setAdminPinError(true); } }
                  }),

                  React.createElement("button", {
                    style: { ...S.greenBtn, background: C.red, opacity: resetting ? 0.6 : 1 },
                    onClick: () => { if (adminPin === "1749") resetAll(); else setAdminPinError(true); },
                    disabled: resetting
                  }, resetting ? "Reseteando…" : "Confirmar reset")
                )
              )
            )
          )
        )
      );
    }
